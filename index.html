<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Trentino dei Mercati</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --blu:#3878b8;--blu-scuro:#183858;--blu-mid:#2868a8;
  --azzurro:#c8e8f8;--azzurro-mid:#87bcd8;
  --giallo:#f8b838;--giallo-light:#f8d878;
  --crema:#f4f8fc;--crema-dark:#ddeef8;
  --text:#183858;--grigio:#5a7a8a;--white:#fff;
  --shadow:0 4px 24px rgba(24,56,88,0.10);
  --shadow-lg:0 8px 40px rgba(24,56,88,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--crema);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}

/* HEADER */
.header{background:linear-gradient(160deg,var(--blu-scuro) 0%,var(--blu) 100%);padding:48px 24px 28px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-60px;right:-40px;width:220px;height:220px;background:var(--blu-mid);border-radius:50%;opacity:.3;}
.header::after{content:'';position:absolute;bottom:-50px;left:-20px;width:180px;height:180px;background:var(--azzurro-mid);border-radius:50%;opacity:.15;}
/* montagne decorative */
.header-mountains{position:absolute;bottom:0;left:0;right:0;height:40px;opacity:.15;}
.header-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--azzurro);font-weight:500;margin-bottom:6px;position:relative;z-index:1;}
.header-logo-title{display:flex;align-items:center;gap:14px;position:relative;z-index:1;margin-bottom:8px;}
.header-logo{width:52px;height:52px;border-radius:12px;object-fit:contain;background:white;padding:4px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.header-title-wrap{}
.header-title-top{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,.85);letter-spacing:2px;text-transform:uppercase;}
.header-title-script{font-family:'Dancing Script',cursive;font-size:32px;color:var(--giallo);line-height:1.1;}
.header-count{margin-top:8px;font-size:13px;color:rgba(255,255,255,.55);position:relative;z-index:1;}
.header-count span{color:var(--giallo-light);font-weight:600;}

/* SEARCH */
.search-wrap{padding:14px 20px 0;background:linear-gradient(160deg,var(--blu-scuro),var(--blu));position:relative;z-index:1;}
.search-box{display:flex;align-items:center;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:12px 16px;gap:10px;}
.search-box input{background:none;border:none;outline:none;color:white;font-family:'DM Sans',sans-serif;font-size:15px;width:100%;}
.search-box input::placeholder{color:rgba(255,255,255,.45);}

/* WAVE */
.wave{background:linear-gradient(160deg,var(--blu-scuro),var(--blu));height:24px;position:relative;}
.wave::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:var(--crema);border-radius:24px 24px 0 0;}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:8px;padding:16px 20px 0;}
.view-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:12px;border:1.5px solid var(--crema-dark);background:var(--white);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--grigio);cursor:pointer;transition:all .2s;}
.view-btn.active{background:var(--blu);border-color:var(--blu);color:white;}

/* LOADING/ERROR */
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 24px;gap:16px;color:var(--grigio);font-size:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--crema-dark);border-top-color:var(--blu);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{margin:20px;padding:16px 20px;background:#FEF2F2;border:1px solid #FECACA;border-radius:14px;font-size:13px;color:#991B1B;line-height:1.5;}

/* FILTERS */
.filters-section{padding:14px 20px 0;}
.filter-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--grigio);font-weight:500;margin-bottom:7px;}
.filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 14px;border-radius:100px;border:1.5px solid var(--crema-dark);background:var(--white);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--grigio);cursor:pointer;transition:all .18s;white-space:nowrap;}
.chip:hover{border-color:var(--azzurro-mid);color:var(--blu);}
.chip.active{background:var(--blu);border-color:var(--blu);color:white;font-weight:500;}
.chip.fiera.active{background:#e07820;border-color:#e07820;}
.chip.stagionale.active{background:#2899a8;border-color:#2899a8;}

/* ACTIVE TAGS */
.active-filters{display:flex;flex-wrap:wrap;gap:6px;padding:4px 20px 6px;}
.active-tag{display:flex;align-items:center;gap:5px;background:var(--crema-dark);border-radius:100px;padding:4px 10px 4px 12px;font-size:12px;color:var(--blu);font-weight:500;}
.active-tag button{background:none;border:none;cursor:pointer;color:var(--grigio);font-size:15px;line-height:1;padding:0;}

/* RESULTS */
.results-header{padding:2px 20px 10px;font-size:13px;color:var(--grigio);}
.results-header strong{color:var(--text);}

/* CARDS */
.list-wrap{padding:0 20px 100px;}
.card{background:var(--white);border-radius:20px;margin-bottom:13px;overflow:hidden;box-shadow:var(--shadow);display:flex;cursor:pointer;transition:transform .2s,box-shadow .2s;animation:fadeUp .3s ease both;}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.card-img{width:110px;flex-shrink:0;position:relative;overflow:hidden;background:var(--crema-dark);min-height:120px;}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;}
.card-img .img-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;background:linear-gradient(135deg,var(--azzurro),var(--crema));position:absolute;inset:0;}
.badge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:white;}
.badge-fiera{background:#e07820;}
.badge-settimanale{background:var(--blu);}
.badge-stagionale{background:#2899a8;}
.card-body{padding:13px 13px 13px 11px;flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.card-comune{font-size:11px;color:var(--blu);font-weight:500;margin-bottom:4px;}
.card-nome{font-size:14px;font-weight:500;line-height:1.3;margin-bottom:5px;color:var(--text);}
.card-periodo{font-size:11px;color:var(--grigio);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.card-cat{font-size:10px;color:var(--grigio);background:var(--crema);padding:3px 8px;border-radius:100px;}
.card-banchi{font-size:10px;color:var(--giallo);background:#fff8e8;border:1px solid #f8e8b8;padding:3px 8px;border-radius:100px;font-weight:500;}

/* NO RESULTS */
.no-results{text-align:center;padding:56px 24px;color:var(--grigio);}
.no-results .emoji{font-size:44px;margin-bottom:12px;}
.no-results h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-bottom:8px;}

/* MAPPA */
#mapView{display:none;padding:0 20px 100px;}
#map{height:440px;border-radius:20px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px;}
.map-legend{display:flex;gap:10px;flex-wrap:wrap;padding:12px 14px;background:var(--white);border-radius:14px;box-shadow:var(--shadow);margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--grigio);}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.leaflet-popup-content-wrapper{border-radius:14px!important;box-shadow:var(--shadow-lg)!important;font-family:'DM Sans',sans-serif!important;}
.popup-inner{padding:4px 2px;min-width:190px;}
.popup-foto{width:100%;height:90px;object-fit:cover;border-radius:8px;margin-bottom:8px;display:block;}
.popup-nome{font-size:14px;font-weight:600;color:var(--blu-scuro);margin-bottom:3px;}
.popup-info{font-size:11px;color:var(--grigio);line-height:1.5;margin-bottom:8px;}
.popup-btn{display:block;text-align:center;background:var(--blu);color:white;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;cursor:pointer;border:none;width:100%;font-family:'DM Sans',sans-serif;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(24,56,88,.55);z-index:1000;align-items:flex-end;justify-content:center;max-width:480px;margin:0 auto;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:28px 28px 0 0;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .28s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:40px;height:4px;background:var(--crema-dark);border-radius:100px;margin:14px auto 0;}
.modal-img-wrap{width:100%;height:210px;overflow:hidden;margin-top:16px;position:relative;}
.modal-img-wrap img{width:100%;height:100%;object-fit:cover;}
.modal-img-wrap .modal-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;background:linear-gradient(135deg,var(--azzurro),var(--crema));}
.modal-body{padding:20px 22px 36px;}
.modal-tipo{display:inline-block;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:white;margin-bottom:10px;}
.modal-nome{font-family:'Playfair Display',serif;font-size:24px;line-height:1.2;color:var(--text);margin-bottom:4px;}
.modal-comune{font-size:14px;color:var(--blu);font-weight:500;margin-bottom:18px;}
.modal-row{display:flex;gap:12px;margin-bottom:13px;align-items:flex-start;}
.modal-icon{width:36px;height:36px;background:var(--crema);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.modal-row-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--grigio);font-weight:500;margin-bottom:2px;}
.modal-row-val{font-size:14px;color:var(--text);line-height:1.5;}
.modal-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--blu);color:white;border-radius:14px;padding:15px;font-size:15px;font-weight:500;text-decoration:none;margin-top:20px;transition:background .2s;}
.modal-btn:hover{background:var(--blu-mid);}
.modal-gmaps{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--crema);color:var(--blu);border-radius:14px;padding:13px;font-size:14px;font-weight:500;text-decoration:none;margin-top:10px;border:1.5px solid var(--crema-dark);transition:background .2s;}
.modal-gmaps:hover{background:var(--crema-dark);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--crema-dark);display:flex;padding:10px 0 18px;z-index:50;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--grigio);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;transition:color .2s;}
.nav-btn.active{color:var(--blu);}
.nav-btn svg{width:22px;height:22px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Provincia Autonoma di Trento</div>
  <div class="header-logo-title">
    <img class="header-logo" src="https://raw.githubusercontent.com/mattiafarinaro/mercati-trentino/main/logo.png" onerror="this.style.display='none'" alt="logo">
    <div class="header-title-wrap">
      <div class="header-title-top">Il Trentino</div>
      <div class="header-title-script">dei mercati</div>
    </div>
  </div>
  <div class="header-count">Mostrando <span id="count">—</span> eventi</div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>
    <input type="text" id="searchInput" placeholder="Cerca fiera, mercato o comune…">
  </div>
</div>
<div class="wave"></div>

<div class="view-toggle">
  <button class="view-btn active" id="btnLista" onclick="switchView('lista')">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Lista
  </button>
  <button class="view-btn" id="btnMappa" onclick="switchView('mappa')">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Mappa
  </button>
</div>

<div id="appBody"><div class="loading"><div class="spinner"></div>Caricamento dati…</div></div>
<div id="mapView"></div>

<div id="contattiView" style="display:none;padding:0 20px 100px"></div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal"><div class="modal-handle"></div><div id="modalContent"></div></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="switchSection('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
  </button>
  <button class="nav-btn" id="nav-mappa" onclick="switchSection('mappa')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Mappa
  </button>
  <button class="nav-btn" id="nav-contatti" onclick="switchSection('contatti')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Contatti
  </button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTwNIAT6WReVendR0ZJEr3rbXOnCnFPIszFurgaE1-RaAdMys5Vr-neKzsbBpovgwVKb3KuXh4o_DfC/pub?gid=1337779560&single=true&output=csv';

let MERCATI=[],filtroTipo='',filtroMese='',filtroCategoria='',filtroSearch='',currentView='lista',leafletMap=null,mapMarkers=[];

function parseCoord(s){
  if(!s)return NaN;
  return parseFloat(String(s).trim().replace(/^'/,'').replace(',','.'));
}

function parseCSV(t){
  const rows=[];let row=[],field='',inQ=false;
  for(let i=0;i<t.length;i++){
    const c=t[i],nx=t[i+1];
    if(inQ){if(c==='"'&&nx==='"'){field+='"';i++;}else if(c==='"'){inQ=false;}else{field+=c;}}
    else{if(c==='"'){inQ=true;}else if(c===','||c===';'){row.push(field.trim());field='';}
    else if(c==='\n'||(c==='\r'&&nx==='\n')){row.push(field.trim());field='';if(row.some(f=>f))rows.push(row);row=[];if(c==='\r')i++;}
    else{field+=c;}}
  }
  if(field||row.length){row.push(field.trim());if(row.some(f=>f))rows.push(row);}
  return rows;
}

async function loadData(){
  try{
    let text='';
    try{const r=await fetch(SHEET_URL);if(!r.ok)throw 0;text=await r.text();}
    catch{const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(SHEET_URL));if(!r.ok)throw new Error('Errore '+r.status);text=(await r.json()).contents;}
    const rows=parseCSV(text);
    if(rows.length<2)throw new Error('Foglio vuoto');
    const h=rows[0].map(x=>x.toLowerCase().trim().replace(/\s+/g,' '));
    console.log('🗂️ Colonne foglio:', h);
    console.log('📍 Prima riga dati:', rows[1]);    MERCATI=rows.slice(1).map((row,idx)=>{
      const o={};h.forEach((k,i)=>o[k]=row[i]||'');
      return{
        nome:o['nome']||'',
        comune:o['comune']||'',
        tipo:o['tipo evento']||o['tipo']||'',
        categoria:o['categoria']||'',
        periodo:o['periodo descrittivo']||o['periodo']||'',
        data:o['data']||'',
        mese:o['mese / stagione']||o['mese stagione']||o['mese']||'',
        giorno:o['giorno fisso']||o['giorno']||'',
        comunita:o["comunita' di valle"]||o['comunita di valle']||o['comunita']||'',
        banchi:o['numero banchi']||'',
        foto:o['foto copertina']||o['foto']||'',
        lat:o['latitudine']||o['lat']||'',
        lng:o['longitudine']||o['longitudine ']||o['lng']||o['lon']||'',
        sito:o['sito web']||o['sito']||'',
        note:o['note']||'',
        attivo:(o['attivo']||'true').toLowerCase()!=='false',
        _idx:idx,
      };
    }).filter(m=>m.attivo&&m.nome);
    const conGPS=MERCATI.filter(m=>m.lat&&m.lng);
    console.log('✅ Totale eventi:', MERCATI.length, '| Con GPS:', conGPS.length);
    if(conGPS.length>0)console.log('📍 Esempio coord:', conGPS[0].nome, conGPS[0].lat, conGPS[0].lng);
    renderUI();
  }catch(e){
    document.getElementById('appBody').innerHTML='<div class="error-box">⚠️ Impossibile caricare i dati.<br><small>'+e.message+'</small></div>';
  }
}

function renderUI(){
  const cat=[...new Set(MERCATI.map(m=>m.categoria))].filter(Boolean).sort();
  const MESI=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const MS=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  document.getElementById('appBody').innerHTML=`
    <div class="filters-section">
      <div class="filter-label">Tipo</div>
      <div class="filter-row" id="tipoRow">
        <button class="chip active" data-v="">Tutti</button>
        <button class="chip fiera" data-v="Fiera">⭐ Fiera</button>
        <button class="chip" data-v="Mercato settimanale">🛒 Settimanale</button>
        <button class="chip stagionale" data-v="Mercato stagionale">🌿 Stagionale</button>
      </div>
      <div class="filter-label">Mese</div>
      <div class="filter-row" id="meseRow">
        <button class="chip active" data-v="">Tutti</button>
        ${MESI.map((m,i)=>'<button class="chip" data-v="'+m+'">'+MS[i]+'</button>').join('')}
      </div>
    </div>
    <div class="active-filters" id="activeTags"></div>
    <div class="results-header"><strong id="resultN">0</strong> risultati</div>
    <div class="list-wrap" id="listWrap"></div>`;

  ['tipoRow','meseRow'].forEach(id=>{
    document.getElementById(id).addEventListener('click',e=>{
      const chip=e.target.closest('.chip');if(!chip)return;
      document.querySelectorAll('#'+id+' .chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      if(id==='tipoRow')filtroTipo=chip.dataset.v;
      if(id==='meseRow')filtroMese=chip.dataset.v;
      render();
    });
  });
  document.getElementById('searchInput').addEventListener('input',e=>{filtroSearch=e.target.value.trim();render();});
  render();
}

function matchMese(m,f){
  if(!f)return true;if(!m)return false;
  if(m.toLowerCase().includes('tutto')||m.toLowerCase().includes('anno'))return true;
  if(m==='Estate')return['Giugno','Luglio','Agosto'].includes(f);
  if(m==='Primavera')return['Marzo','Aprile','Maggio'].includes(f);
  if(m==='Autunno')return['Settembre','Ottobre','Novembre'].includes(f);
  if(m==='Inverno')return['Dicembre','Gennaio','Febbraio'].includes(f);
  return m.includes(f);
}

function tipoColor(t){return t==='Fiera'?'#e07820':t==='Mercato stagionale'?'#2899a8':'#3878b8';}
function bClass(t){return t==='Fiera'?'badge-fiera':t==='Mercato stagionale'?'badge-stagionale':'badge-settimanale';}
function bLabel(t){return t==='Fiera'?'Fiera':t==='Mercato stagionale'?'Stagionale':'Settim.';}
function emoji(m){
  if(m.tipo==='Fiera')return'⭐';
  if(m.tipo==='Mercato stagionale')return'🌿';
  return'🛒';
}

function getFiltrati(){
  return MERCATI.filter(m=>{
    if(filtroTipo&&m.tipo!==filtroTipo)return false;
    if(!matchMese(m.mese,filtroMese))return false;
    if(filtroSearch){const q=filtroSearch.toLowerCase();if(!m.nome.toLowerCase().includes(q)&&!m.comune.toLowerCase().includes(q))return false;}
    return true;
  });
}

function render(){
  const f=getFiltrati();
  document.getElementById('count').textContent=f.length;
  if(document.getElementById('resultN'))document.getElementById('resultN').textContent=f.length;
  let tags='';
  if(filtroTipo)tags+='<span class="active-tag">'+filtroTipo+'<button onclick="clearF(\'tipo\')">×</button></span>';
  if(filtroMese)tags+='<span class="active-tag">'+filtroMese+'<button onclick="clearF(\'mese\')">×</button></span>';
  if(document.getElementById('activeTags'))document.getElementById('activeTags').innerHTML=tags;
  if(currentView==='lista')renderLista(f);else renderMappa(f);
}

function renderLista(f){
  const w=document.getElementById('listWrap');
  if(!f.length){w.innerHTML='<div class="no-results"><div class="emoji">🔍</div><h3>Nessun risultato</h3><p>Prova a modificare i filtri.</p></div>';return;}
  w.innerHTML=f.map((m,i)=>{
    const e=emoji(m);
    const delay=Math.min(i*30,400);
    const periodo=m.data||m.periodo||'';
    const banchiHtml=m.banchi?'<span class="card-banchi">🏪 '+m.banchi+' banchi</span>':'<span class="card-cat">'+m.categoria+'</span>';
    return '<div class="card" style="animation-delay:'+delay+'ms" onclick="openModal('+MERCATI.indexOf(m)+')">'+
      '<div class="card-img">'+
        '<div class="img-emoji">'+e+'</div>'+
        (m.foto?'<img src="'+m.foto+'" alt="'+m.nome+'" loading="lazy" onerror="this.style.display=\'none\'" onload="this.previousElementSibling.style.display=\'none\'">':'')+
        '<span class="badge '+bClass(m.tipo)+'">'+bLabel(m.tipo)+'</span>'+
      '</div>'+
      '<div class="card-body">'+
        '<div>'+
          '<div class="card-comune">📍 '+m.comune+'</div>'+
          '<div class="card-nome">'+m.nome+'</div>'+
          '<div class="card-periodo">'+periodo+'</div>'+
        '</div>'+
        '<div class="card-footer">'+banchiHtml+'<span style="color:var(--crema-dark);font-size:18px">›</span></div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderMappa(f){
  if(leafletMap){leafletMap.remove();leafletMap=null;}
  const v=document.getElementById('mapView');
  v.innerHTML='<div class="map-legend">'+
    '<div class="legend-item"><div class="legend-dot" style="background:#e07820"></div>Fiera</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:#3878b8"></div>Settimanale</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:#2899a8"></div>Stagionale</div>'+
  '</div><div id="map" style="height:440px;width:100%;border-radius:20px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px;"></div><div id="mapCards" style="margin-top:12px"></div>';

  const conCoords=f.filter(m=>!isNaN(parseCoord(m.lat))&&!isNaN(parseCoord(m.lng))&&parseCoord(m.lat)!==0);
  const senzaCoords=f.filter(m=>isNaN(parseCoord(m.lat))||isNaN(parseCoord(m.lng))||parseCoord(m.lat)===0);

  // Mini cards subito (non dipendono dalla mappa)
  const mapC=document.getElementById('mapCards');
  if(senzaCoords.length>0) mapC.innerHTML='<div style="font-size:12px;color:var(--grigio);padding:0 0 8px">⚠️ '+senzaCoords.length+' eventi senza GPS non mostrati</div>';
  mapC.innerHTML+=conCoords.slice(0,20).map(m=>{
    const lat=parseCoord(m.lat),lng=parseCoord(m.lng);
    return '<div class="card" onclick="focusPin('+lat+','+lng+')">'+
      '<div class="card-img" style="min-height:80px">'+
        (m.foto?'<img src="'+m.foto+'" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0" onerror="this.style.display=\'none\'">':'')+
        '<div class="img-emoji" style="font-size:22px">'+emoji(m)+'</div>'+
      '</div>'+
      '<div class="card-body">'+
        '<div class="card-comune">📍 '+m.comune+'</div>'+
        '<div class="card-nome" style="font-size:13px">'+m.nome+'</div>'+
        (m.banchi?'<div class="card-periodo">🏪 '+m.banchi+' banchi</div>':'')+
      '</div></div>';
  }).join('');

  // Inizializza la mappa dopo che il DOM è stato renderizzato
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const mapEl=document.getElementById('map');
      if(!mapEl||leafletMap)return;
      leafletMap=L.map(mapEl,{zoomControl:true,scrollWheelZoom:true}).setView([46.07,11.12],9);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
        attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
      }).addTo(leafletMap);
      mapMarkers=[];
      conCoords.forEach(m=>{
        try{
          const lat=parseCoord(m.lat),lng=parseCoord(m.lng);
          if(isNaN(lat)||isNaN(lng))return;
          const col=tipoColor(m.tipo);
          const icon=L.divIcon({
            html:'<div style="background:'+col+';width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.3)"></div>',
            iconSize:[28,28],iconAnchor:[14,28],popupAnchor:[0,-32],className:''
          });
          const fotoHtml=m.foto?'<img class="popup-foto" src="'+m.foto+'" onerror="this.style.display=\'none\'">':'';
          const popup='<div class="popup-inner">'+fotoHtml+'<div class="popup-nome">'+m.nome+'</div><div class="popup-info">📍 '+m.comune+(m.banchi?' · 🏪 '+m.banchi+' banchi':'')+(m.data?'<br>📅 '+m.data:'')+'</div><button class="popup-btn" onclick="openModal('+MERCATI.indexOf(m)+')">Vedi dettagli</button></div>';
          const mk=L.marker([lat,lng],{icon}).addTo(leafletMap).bindPopup(popup,{maxWidth:220});
          mapMarkers.push({mk,lat,lng,m});
        }catch(e){}
      });
      leafletMap.invalidateSize();
    });
  });
}

function focusPin(lat,lng){
  if(!leafletMap)return;
  leafletMap.setView([lat,lng],14,{animate:true});
  mapMarkers.forEach(({mk,lat:mlat,lng:mlng})=>{
    if(Math.abs(mlat-lat)<0.001&&Math.abs(mlng-lng)<0.001)mk.openPopup();
  });
  document.getElementById('map').scrollIntoView({behavior:'smooth',block:'center'});
}

function switchView(v){
  currentView=v;
  document.getElementById('btnLista').classList.toggle('active',v==='lista');
  document.getElementById('btnMappa').classList.toggle('active',v==='mappa');
  const appBody=document.getElementById('appBody');
  const mapView=document.getElementById('mapView');
  if(v==='lista'){
    appBody.style.display='';
    mapView.style.display='none';
  } else {
    appBody.style.display='none';
    mapView.style.display='block';
    mapView.style.minHeight='500px';
    // Piccolo delay per garantire che il browser abbia calcolato le dimensioni
    setTimeout(()=>renderMappa(getFiltrati()), 50);
  }
}

function clearF(t){
  if(t==='tipo'){filtroTipo='';document.querySelectorAll('#tipoRow .chip').forEach(c=>c.classList.toggle('active',c.dataset.v===''));}
  if(t==='mese'){filtroMese='';document.querySelectorAll('#meseRow .chip').forEach(c=>c.classList.toggle('active',c.dataset.v===''));}
  render();
}

function navFilter(tipo){
  filtroTipo=tipo;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const map={'':'nav-all','Fiera':'nav-f','Mercato settimanale':'nav-s','Mercato stagionale':'nav-st'};
  document.getElementById(map[tipo]||'nav-all').classList.add('active');
  if(document.getElementById('tipoRow'))
    document.querySelectorAll('#tipoRow .chip').forEach(c=>c.classList.toggle('active',c.dataset.v===tipo));
  render();window.scrollTo({top:0,behavior:'smooth'});
}

function openModal(idx){
  const m=MERCATI[idx];
  const e=emoji(m);
  const gmaps=m.lat&&m.lng?'<a class="modal-gmaps" href="https://maps.google.com/?q='+m.lat+','+m.lng+'" target="_blank">🗺️ Apri in Google Maps</a>':'';
  document.getElementById('modalContent').innerHTML=
    '<div class="modal-img-wrap">'+
      '<div class="modal-emoji">'+e+'</div>'+
      (m.foto?'<img src="'+m.foto+'" onerror="this.style.display=\'none\'" onload="this.previousElementSibling.style.display=\'none\'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">':'')+
    '</div>'+
    '<div class="modal-body">'+
      '<span class="modal-tipo" style="background:'+tipoColor(m.tipo)+'">'+m.tipo+'</span>'+
      '<div class="modal-nome">'+m.nome+'</div>'+
      '<div class="modal-comune">📍 '+m.comune+'</div>'+
      (m.data||m.periodo?'<div class="modal-row"><div class="modal-icon">🗓️</div><div><div class="modal-row-lbl">Data / Periodo</div><div class="modal-row-val">'+(m.data||m.periodo)+'</div></div></div>':'')+
      (m.giorno?'<div class="modal-row"><div class="modal-icon">📅</div><div><div class="modal-row-lbl">Giorno</div><div class="modal-row-val">'+m.giorno+'</div></div></div>':'')+
      (m.banchi?'<div class="modal-row"><div class="modal-icon">🏪</div><div><div class="modal-row-lbl">Numero banchi</div><div class="modal-row-val">'+m.banchi+'</div></div></div>':'')+
      (m.comunita?'<div class="modal-row"><div class="modal-icon">🏔️</div><div><div class="modal-row-lbl">Comunità di Valle</div><div class="modal-row-val">'+m.comunita+'</div></div></div>':'')+
      (m.note?'<div class="modal-row"><div class="modal-icon">💬</div><div><div class="modal-row-lbl">Note</div><div class="modal-row-val">'+m.note+'</div></div></div>':'')+
      (m.sito?'<a class="modal-btn" href="'+m.sito+'" target="_blank">🔗 Visita il sito ufficiale</a>':'')+
      gmaps+
    '</div>';
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e){if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');}

let _contattiSearch='';
function switchSection(s){
  ['home','mappa','contatti'].forEach(x=>document.getElementById('nav-'+x).classList.remove('active'));
  document.getElementById('nav-'+s).classList.add('active');
  document.getElementById('appBody').style.display=s==='home'?'':'none';
  document.getElementById('mapView').style.display='none';
  document.getElementById('contattiView').style.display=s==='contatti'?'block':'none';
  document.querySelector('.view-toggle').style.display=s==='home'?'flex':'none';
  if(s==='mappa'){
    document.getElementById('mapView').style.display='block';
    document.getElementById('mapView').style.minHeight='500px';
    setTimeout(()=>renderMappa(getFiltrati()),50);
  }
  if(s==='contatti')renderContatti();
  if(s==='home')currentView='lista';
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderContatti(){
  const v=document.getElementById('contattiView');
  const q=_contattiSearch.toLowerCase();
  const filtrati=COMUNI.filter(function(c){return !q||c.nome.toLowerCase().includes(q)||c.comunita.toLowerCase().includes(q);});
  let out='<div style="padding:16px 0 12px">'
    +'<div style="background:white;border-radius:14px;padding:11px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)">'
    +'<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="var(--grigio)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>'
    +'<input id="csearch" type="text" placeholder="Cerca comune..." value="'+_contattiSearch+'"'
    +' style="border:none;outline:none;font-family:DM Sans,sans-serif;font-size:14px;color:var(--text);width:100%;background:none"'
    +' oninput="_contattiSearch=this.value;renderContatti()"></div></div>'
    +'<div style="font-size:13px;color:var(--grigio);margin-bottom:12px"><strong style="color:var(--text)">'+filtrati.length+'</strong> comuni</div>';
  for(var i=0;i<filtrati.length;i++){
    var c=filtrati[i];
    out+='<div style="background:white;border-radius:20px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)">';
    out+='<div style="display:flex;align-items:center;gap:14px;padding:16px 16px 12px">';
    if(c.logo){out+='<img src="'+c.logo+'" style="width:44px;height:44px;object-fit:contain;flex-shrink:0;border-radius:6px" onerror="this.style.display=\'none\'">';}
    else{out+='<div style="width:44px;height:44px;background:var(--crema);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">\uD83C\uDFDB\uFE0F</div>';}
    out+='<div><div style="font-weight:600;font-size:16px;color:var(--text)">'+c.nome+'</div>';
    out+='<div style="font-size:11px;color:var(--blu);font-weight:500">'+c.comunita+'</div></div></div>';
    out+='<div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:8px">';
    if(c.indirizzo){out+='<div style="display:flex;gap:10px"><span style="width:22px;text-align:center">\uD83D\uDCCD</span><span style="font-size:13px;color:var(--grigio)">'+c.indirizzo+(c.cap?' \u2014 '+c.cap:'')+'</span></div>';}
    if(c.tel){out+='<div style="display:flex;gap:10px;align-items:center"><span style="width:22px;text-align:center">\uD83D\uDCDE</span><a href="tel:'+c.tel+'" style="font-size:13px;color:var(--blu);font-weight:500;text-decoration:none">'+c.tel+'</a></div>';}
    if(c.pec){out+='<div style="display:flex;gap:10px;align-items:center"><span style="width:22px;text-align:center">\u2709\uFE0F</span><a href="mailto:'+c.pec+'" style="font-size:13px;color:var(--blu);font-weight:500;text-decoration:none;word-break:break-all">'+c.pec+'</a></div>';}
    if(c.funzionario){out+='<div style="display:flex;gap:10px;align-items:center"><span style="width:22px;text-align:center">\uD83D\uDC64</span><span style="font-size:13px;color:var(--grigio)"><strong>Funzionario:</strong> '+c.funzionario+'</span></div>';}
    if(c.sindaco){out+='<div style="display:flex;gap:10px;align-items:center"><span style="width:22px;text-align:center">\uD83C\uDFC5</span><span style="font-size:13px;color:var(--grigio)"><strong>Sindaco:</strong> '+c.sindaco+'</span></div>';}
    if(c.sito){out+='<a href="'+c.sito+'" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:6px;background:var(--blu);color:white;border-radius:10px;padding:10px;font-size:13px;font-weight:500;text-decoration:none;margin-top:4px">\uD83D\uDD17 Sito ufficiale</a>';}
    out+='</div></div>';
  }
  v.innerHTML=out;
}

loadData();
